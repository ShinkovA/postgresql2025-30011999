---
- name: Ensure HAProxy is installed
  ansible.builtin.apt:
    name:
      - haproxy
    state: present
    update_cache: true
    cache_valid_time: 3600
    lock_timeout: 600

- name: Deploy haproxy.cfg (Patroni-aware)
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: '0644'
  notify: Restart haproxy

- name: Ensure HAProxy is enabled and running
  ansible.builtin.systemd:
    name: haproxy
    state: started
    enabled: true

