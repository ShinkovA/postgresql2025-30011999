---
- name: Configure PostgreSQL + Patroni (3 nodes)
  hosts: patroni_nodes
  become: true
  gather_facts: true

  pre_tasks:
    - name: Wait for cloud-init to finish (avoids apt/dpkg locks)
      ansible.builtin.wait_for:
        path: /var/lib/cloud/instance/boot-finished
        timeout: 900
      changed_when: false
      failed_when: false

  roles:
    - common
    - patroni
    # pgBackRest must be installed/configured AFTER Patroni added the PGDG repo.
    # Otherwise Ubuntu's pgbackrest can be too old for the selected PostgreSQL version (e.g. PG17).
    - role: pgbackrest_client
      when: pgbackrest_enabled | default(false) | bool
