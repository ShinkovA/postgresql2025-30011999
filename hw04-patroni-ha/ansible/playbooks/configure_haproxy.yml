---
- name: Configure HAProxy for Patroni cluster
  hosts: haproxy_nodes
  become: true
  gather_facts: true

  pre_tasks:
    - name: Wait for cloud-init to finish (avoids apt/dpkg locks)
      ansible.builtin.wait_for:
        path: /var/lib/cloud/instance/boot-finished
        timeout: 900
      changed_when: false
      failed_when: false

  roles:
    - common
    - haproxy
