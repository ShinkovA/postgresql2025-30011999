---
- name: Start Minikube
  hosts: all
  gather_facts: false
  tasks:
    - name: Delete old profile if exists
      ansible.builtin.shell: |
        minikube -p {{ minikube_profile }} delete || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Start Minikube cluster
      ansible.builtin.shell: |
        set -euo pipefail
        minikube start           -p {{ minikube_profile }}           --driver={{ minikube_driver }}           --cpus={{ minikube_cpus }}           --memory={{ minikube_memory }}           --disk-size={{ minikube_disk_size }}           --kubernetes-version={{ minikube_kubernetes_version }}           --addons=default-storageclass,storage-provisioner
      args:
        executable: /bin/bash
      changed_when: true

    - name: Show cluster status
      ansible.builtin.shell: |
        set -euo pipefail
        minikube -p {{ minikube_profile }} status
        kubectl get nodes
        kubectl get storageclass
      args:
        executable: /bin/bash
      register: status
      changed_when: false

    - name: Print cluster status
      ansible.builtin.debug:
        var: status.stdout_lines
