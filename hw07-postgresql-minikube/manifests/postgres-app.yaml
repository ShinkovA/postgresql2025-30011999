apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-manifest-pvc
  namespace: hw07-manifest
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-manifest
  namespace: hw07-manifest
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-manifest
  template:
    metadata:
      labels:
        app: postgres-manifest
    spec:
      containers:
        - name: postgres
          image: postgres:18.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/18/docker
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-manifest-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-manifest
  namespace: hw07-manifest
spec:
  type: ClusterIP
  selector:
    app: postgres-manifest
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
